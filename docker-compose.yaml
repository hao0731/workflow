services:
  mongodb:
    image: mongo:7.0
    container_name: orchestration-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: orchestration

  nats:
    image: nats:2.10-alpine
    container_name: orchestration-nats
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    volumes:
      - nats_data:/data

volumes:
  mongodb_data:
  nats_data:
