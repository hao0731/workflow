services:
  mongodb:
    image: mongo:7.0
    container_name: orchestration-mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: orchestration
    networks:
      - orchestration

  nats:
    image: nats:2.10-alpine
    container_name: orchestration-nats
    ports:
      - "8222:8222"   # HTTP monitoring
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    networks:
      - orchestration

  cassandra:
    image: cassandra:4.1
    container_name: orchestration-cassandra
    volumes:
      - cassandra_data:/var/lib/cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: orchestration
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - orchestration

networks:
  orchestration:
    name: orchestration

volumes:
  mongodb_data:
  nats_data:
  cassandra_data:
