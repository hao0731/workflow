name: orchestration-app

services:
  workflow-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orchestration-workflow-api
    entrypoint: ["./workflow-api"]
    ports:
      - "8083:8083"
    environment:
      MONGO_URI: mongodb://orchestration-mongodb:27017
      MONGO_DATABASE: orchestration
      NATS_URL: nats://orchestration-nats:4222
      WORKFLOW_API_PORT: 8083
      CASSANDRA_HOSTS: orchestration-cassandra
      CASSANDRA_KEYSPACE: orchestration
      CASSANDRA_PORT: 9042
    networks:
      - orchestration

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orchestration-orchestrator
    entrypoint: ["./orchestrator"]
    environment:
      MONGO_URI: mongodb://orchestration-mongodb:27017
      MONGO_DATABASE: orchestration
      NATS_URL: nats://orchestration-nats:4222
      CASSANDRA_HOSTS: orchestration-cassandra
      CASSANDRA_KEYSPACE: orchestration
      CASSANDRA_PORT: 9042
    networks:
      - orchestration

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orchestration-scheduler
    entrypoint: ["./scheduler"]
    environment:
      MONGO_URI: mongodb://orchestration-mongodb:27017
      MONGO_DATABASE: orchestration
      NATS_URL: nats://orchestration-nats:4222
      CASSANDRA_HOSTS: orchestration-cassandra
      CASSANDRA_KEYSPACE: orchestration
      CASSANDRA_PORT: 9042
    networks:
      - orchestration

  worker-firstparty:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orchestration-worker-firstparty
    entrypoint: ["./worker-firstparty"]
    environment:
      MONGO_URI: mongodb://orchestration-mongodb:27017
      MONGO_DATABASE: orchestration
      NATS_URL: nats://orchestration-nats:4222
    networks:
      - orchestration

  registry:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orchestration-registry
    entrypoint: ["./registry"]
    ports:
      - "8084:8084"
    environment:
      PORT: 8084
      JWT_SECRET: default-secret-change-in-production
      MONGO_URI: mongodb://orchestration-mongodb:27017
      MONGO_DATABASE: orchestration
      NATS_URL: nats://orchestration-nats:4222
    networks:
      - orchestration

networks:
  orchestration:
    external: true
